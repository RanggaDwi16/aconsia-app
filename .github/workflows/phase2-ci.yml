name: phase2-ci

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  web-aconsia-build:
    name: Web Aconsia Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-aconsia
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-aconsia/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  functions-rules-gate:
    name: Functions + Rules Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Setup Java 21 (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Validate functions syntax
        run: node --check index.js

      - name: Run Firestore rules tests
        run: npm run test:rules
